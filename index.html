<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tracker de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eff4;
    --text2: #9998a8;
    --text3: #5a5968;
    --green: #1D9E75;
    --green-dim: rgba(29,158,117,0.15);
    --green-bright: #2dbd8e;
    --accent: #7f77dd;
    --accent-dim: rgba(127,119,221,0.12);
    --red: #e24b4a;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.5; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 60% 40% at 70% 10%, rgba(127,119,221,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 80%, rgba(29,158,117,0.06) 0%, transparent 50%),
      var(--bg);
    padding-bottom: 3rem;
  }

  .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem; }

  /* Header */
  header { margin-bottom: 2rem; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  h1 span { color: var(--green-bright); }
  .today-pill {
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    background: var(--surface); border: 0.5px solid var(--border2);
    padding: 5px 10px; border-radius: 20px; white-space: nowrap; margin-top: 4px;
  }

  /* Week nav */
  .week-bar { display: flex; align-items: center; gap: 10px; margin-top: 1.25rem; }
  .nav-btn {
    background: var(--surface); border: 0.5px solid var(--border2);
    color: var(--text2); border-radius: var(--radius-sm); padding: 6px 12px;
    cursor: pointer; font-family: var(--font); font-size: 13px; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .week-label { font-size: 13px; color: var(--text2); flex: 1; text-align: center; font-family: var(--mono); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; }
  .stat {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .stat:hover { border-color: var(--border2); }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; }
  .stat-value.green { color: var(--green-bright); }
  .stat-value.accent { color: var(--accent); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Progress */
  .progress-wrap { margin-bottom: 1.75rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .progress-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-bright)); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* Section */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    color: var(--text3); text-transform: uppercase; margin-bottom: 10px;
  }

  /* Habit rows */
  .habits-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; }
  .habit-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .habit-row:hover { border-color: var(--border2); }
  .habit-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-streak { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .habit-streak.active { color: var(--green); }

  /* Week dots */
  .week-dots { display: flex; gap: 3px; flex-shrink: 0; }
  .dot {
    width: 24px; height: 24px; border-radius: 50%;
    border: 0.5px solid var(--border2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-family: var(--mono); color: var(--text3);
    transition: all 0.15s; user-select: none;
  }
  .dot:hover { border-color: rgba(29,158,117,0.4); background: var(--green-dim); }
  .dot.done { background: var(--green); border-color: var(--green); color: transparent; position: relative; }
  .dot.done::after { content: ''; position: absolute; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.8); }
  .dot.today { border-color: var(--accent); }
  .dot.today.done { border-color: var(--green); }
  .dot.future { opacity: 0.3; pointer-events: none; }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 18px; line-height: 1;
    padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: var(--red); background: rgba(226,75,74,0.1); }

  /* Empty */
  .empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }

  /* Add form */
  .add-form {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .add-form-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .add-row { display: flex; gap: 8px; align-items: center; }
  input {
    font-family: var(--font); font-size: 14px;
    background: var(--surface2); border: 0.5px solid var(--border2);
    color: var(--text); border-radius: var(--radius-sm);
    padding: 8px 11px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: rgba(127,119,221,0.5); }
  input::placeholder { color: var(--text3); }
  .emoji-inp { width: 50px; text-align: center; font-size: 18px; padding: 6px 4px; }
  .name-inp { flex: 1; }
  .add-btn {
    background: var(--green-dim); border: 0.5px solid rgba(29,158,117,0.3);
    color: var(--green-bright); border-radius: var(--radius-sm);
    padding: 8px 16px; font-family: var(--font); font-size: 13px;
    font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
  }
  .add-btn:hover { background: rgba(29,158,117,0.25); border-color: var(--green); }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat:last-child { grid-column: span 2; }
    .week-dots { gap: 2px; }
    .dot { width: 20px; height: 20px; font-size: 7px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-top">
      <h1>Mis <span>Hábitos</span></h1>
      <div class="today-pill" id="today-pill"></div>
    </div>
    <div class="week-bar">
      <button class="nav-btn" onclick="changeWeek(-1)">← ant</button>
      <div class="week-label" id="week-label"></div>
      <button class="nav-btn" onclick="changeWeek(1)">sig →</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Hoy</div>
      <div class="stat-value green" id="stat-today">0</div>
      <div class="stat-sub" id="stat-today-sub">de 0 hábitos</div>
    </div>
    <div class="stat">
      <div class="stat-label">Mejor racha</div>
      <div class="stat-value accent" id="stat-streak">0</div>
      <div class="stat-sub">días seguidos</div>
    </div>
    <div class="stat">
      <div class="stat-label">Esta semana</div>
      <div class="stat-value" id="stat-week">0%</div>
      <div class="stat-sub" id="stat-week-sub">completado</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Progreso semanal</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="section-label">Hábitos</div>
  <div class="habits-list" id="habits-list"></div>

  <div class="add-form">
    <div class="add-form-label">Agregar hábito</div>
    <div class="add-row">
      <input class="emoji-inp" id="emoji-inp" maxlength="2" placeholder="🎯" />
      <input class="name-inp" id="name-inp" placeholder="Ej: Leer 20 minutos" />
      <button class="add-btn" onclick="addHabit()">Agregar</button>
    </div>
  </div>

</div>

<script>
const DAYS = ['D','L','M','M','J','V','S'];
const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MONTH_FULL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAY_FULL = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

let weekOffset = 0;
let habits = JSON.parse(localStorage.getItem('hb_habits') || 'null') || [
  {id:1, name:'Ejercicio', icon:'💪'},
  {id:2, name:'Leer', icon:'📚'},
  {id:3, name:'Meditar', icon:'🧘'},
];
let logs = JSON.parse(localStorage.getItem('hb_logs') || '{}');

function save() {
  localStorage.setItem('hb_habits', JSON.stringify(habits));
  localStorage.setItem('hb_logs', JSON.stringify(logs));
}

function dateKey(d) { return d.toISOString().slice(0,10); }

function getWeekDates(offset) {
  const d = new Date(TODAY);
  const dow = (d.getDay() + 6) % 7; // lunes=0
  const mon = new Date(d);
  mon.setDate(d.getDate() - dow + offset * 7);
  return Array.from({length:7}, (_,i) => { const x = new Date(mon); x.setDate(mon.getDate()+i); return x; });
}

function isDone(hid, date) {
  const k = dateKey(date);
  return !!(logs[k] && logs[k][hid]);
}

function toggle(hid, dateStr) {
  if (!logs[dateStr]) logs[dateStr] = {};
  logs[dateStr][hid] = !logs[dateStr][hid];
  if (!logs[dateStr][hid]) delete logs[dateStr][hid];
  save(); render();
}

function calcStreak(hid) {
  let streak = 0, d = new Date(TODAY);
  while(true) {
    if (!isDone(hid, d)) break;
    streak++; d.setDate(d.getDate()-1);
  }
  return streak;
}

function addHabit() {
  const icon = document.getElementById('emoji-inp').value.trim() || '🎯';
  const name = document.getElementById('name-inp').value.trim();
  if (!name) { document.getElementById('name-inp').focus(); return; }
  habits.push({id: Date.now(), name, icon});
  document.getElementById('emoji-inp').value = '';
  document.getElementById('name-inp').value = '';
  save(); render();
}

function deleteHabit(id) {
  if (!confirm('¿Eliminar este hábito y su historial?')) return;
  habits = habits.filter(h => h.id !== id);
  save(); render();
}

function render() {
  const week = getWeekDates(weekOffset);
  const todayKey = dateKey(TODAY);

  // Pill
  document.getElementById('today-pill').textContent =
    `${DAY_FULL[TODAY.getDay()]}, ${TODAY.getDate()} ${MONTHS[TODAY.getMonth()]} ${TODAY.getFullYear()}`;

  // Week label
  const a = week[0], b = week[6];
  document.getElementById('week-label').textContent = weekOffset === 0
    ? 'Semana actual'
    : (a.getMonth() === b.getMonth()
        ? `${a.getDate()}–${b.getDate()} ${MONTH_FULL[a.getMonth()]}`
        : `${a.getDate()} ${MONTHS[a.getMonth()]} – ${b.getDate()} ${MONTHS[b.getMonth()]}`);

  // Stats
  const todayDone = habits.filter(h => isDone(h.id, TODAY)).length;
  document.getElementById('stat-today').textContent = todayDone;
  document.getElementById('stat-today-sub').textContent = `de ${habits.length} hábito${habits.length!==1?'s':''}`;

  let maxStreak = 0;
  habits.forEach(h => { const s=calcStreak(h.id); if(s>maxStreak) maxStreak=s; });
  document.getElementById('stat-streak').textContent = maxStreak;

  let total = habits.length * 7, done = 0;
  week.forEach(d => habits.forEach(h => { if(isDone(h.id,d)) done++; }));
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('stat-week').textContent = pct+'%';
  document.getElementById('stat-week-sub').textContent = `${done} de ${total} checks`;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-bar').style.width = pct+'%';

  // List
  const list = document.getElementById('habits-list');
  list.innerHTML = '';

  if (habits.length === 0) {
    list.innerHTML = '<div class="empty">Agrega tu primer hábito abajo 👇</div>';
    return;
  }

  habits.forEach(h => {
    const streak = calcStreak(h.id);
    const row = document.createElement('div');
    row.className = 'habit-row';

    const dotsHTML = week.map(d => {
      const done = isDone(h.id, d);
      const isToday = dateKey(d) === todayKey;
      const isFuture = d > TODAY;
      let cls = 'dot';
      if (done) cls += ' done';
      if (isToday) cls += ' today';
      if (isFuture && !done) cls += ' future';
      const label = DAYS[d.getDay()];
      const dk = dateKey(d);
      return `<div class="${cls}" onclick="toggle(${h.id},'${dk}')" title="${label}">${done ? '' : label}</div>`;
    }).join('');

    row.innerHTML = `
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="habit-streak${streak>0?' active':''}">
          ${streak > 0 ? `🔥 ${streak} día${streak!==1?'s':''} seguido${streak!==1?'s':''}` : 'Sin racha aún'}
        </div>
      </div>
      <div class="week-dots">${dotsHTML}</div>
      <button class="del-btn" onclick="deleteHabit(${h.id})" title="Eliminar">×</button>
    `;
    list.appendChild(row);
  });
}

function changeWeek(dir) { weekOffset += dir; render(); }

document.getElementById('name-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

render();
</script>
</body>
</html>
